ass="sidebar"><div class="sidebar-crate"><h2><a href="../../tokio/index.html">tokio</a><span class="version">1.52.3</span></h2></div><div class="sidebar-elems"><div id="rustdoc-modnav"><h2><a href="index.html">在 tokio 中::<wbr>io</a></h2></div></div></nav><div class="sidebar-resizer" title="Drag to resize sidebar"></div><main><div class="width-limiter"><section id="main-content" class="content" tabindex="-1"><div class="main-heading"><div class="rustdoc-breadcrumbs"><a href="../index.html">tokio</a>::<wbr><a href="index.html">io</a></div><h1>函数 <span class="fn">stdin</span>&nbsp;<button id="copy-path" title="复制项目路径 to clipboard">复制项目路径</button></h1><rustdoc-toolbar></rustdoc-toolbar><span class="sub-heading"><a class="src" href="../../src/tokio/io/stdin.rs.html#43-52">Source</a> </span></div><pre class="rust item-decl"><code>pub fn stdin() -&gt; <a class="struct" href="struct.Stdin.html" title="struct tokio::io::Stdin">Stdin</a></code></pre><details class="toggle top-doc" open><summary class="hideme"><span>展开描述</span></summary><div class="docblock"><p>构造一个到当前进程标准输入流的新句柄。</p>
<p>此句柄最适用于非交互式用途，
例如当文件
被管道输入到应用程序时。
出于技术原因，<code>stdin</code>
是通过在单独的线程上使用普通的阻塞读取来实现的，
并且无法取消该读取。
这可能会导致运行时
的关闭挂起，直到用户按下回车键。</p>
<p>对于交互式用途，建议派生一个专用于
用户输入的线程，并在该线程中直接使用阻塞 IO。</p>
